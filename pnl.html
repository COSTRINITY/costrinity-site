<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNiPr PnL Card — COS TRINITY</title>
  <meta name="description" content="Generate shareable trade result cards from your SNiPr Solana transactions. Show off your wins." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #06061a;
      --bg2:       #09092a;
      --surface:   #0e0e38;
      --card:      #0d0d32;
      --border:    rgba(139,92,246,0.2);
      --border-glow: rgba(139,92,246,0.55);
      --purple:    #7c3aed;
      --purple-lt: #a78bfa;
      --purple-dim: rgba(139,92,246,0.12);
      --teal:      #2dd4bf;
      --teal-dim:  rgba(45,212,191,0.12);
      --gold:      #f4c24f;
      --gold-dim:  rgba(244,194,79,0.1);
      --text:      #e8eaf0;
      --muted:     rgba(232,234,240,0.48);
      --green:     #4ade80;
      --red:       #f87171;
      --mono:      'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 90% 55% at 50% -5%, rgba(45,212,191,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 90% 70%, rgba(109,40,217,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 5% 80%, rgba(244,194,79,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ─── NAV ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 48px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(6,6,26,0.88);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
    }

    .nav-brand {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo {
      width: 36px; height: 36px; object-fit: contain;
      filter: invert(1) sepia(1) saturate(6) hue-rotate(10deg);
    }
    .nav-wordmark {
      font-size: 14px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--purple-lt);
    }
    .nav-wordmark em { color: var(--gold); font-style: normal; }

    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a {
      color: var(--muted); font-size: 13px; font-weight: 500;
      text-decoration: none; letter-spacing: 0.06em; text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-back {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--purple-dim);
      border: 1px solid var(--border-glow);
      border-radius: 6px;
      color: var(--purple-lt) !important;
      padding: 8px 18px;
      font-weight: 600 !important;
      transition: background 0.2s, box-shadow 0.2s !important;
    }
    .nav-back:hover {
      background: rgba(139,92,246,0.22) !important;
      box-shadow: 0 0 18px rgba(139,92,246,0.4);
      color: #fff !important;
    }

    /* ─── MAIN ─── */
    main {
      position: relative; z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }

    /* ─── PAGE HEADER ─── */
    .page-header {
      text-align: center;
      margin-bottom: 52px;
    }
    .page-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--teal-dim);
      border: 1px solid rgba(45,212,191,0.3);
      border-radius: 999px;
      padding: 7px 20px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 24px;
    }
    .eyebrow-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--teal); box-shadow: 0 0 8px var(--teal);
      animation: blink 2.2s ease-in-out infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .page-header h1 {
      font-size: clamp(32px, 6vw, 64px);
      font-weight: 900; line-height: 1.1; letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    .page-header h1 span { color: var(--teal); }
    .page-header p {
      color: var(--muted); font-size: 16px; max-width: 500px; margin: 0 auto;
    }

    /* ─── INPUT SECTION ─── */
    .input-section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 32px;
    }

    .input-label {
      display: block; font-size: 12px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }

    .input-row {
      display: flex; gap: 12px; flex-wrap: wrap;
    }

    .tx-input {
      flex: 1; min-width: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .tx-input::placeholder { color: var(--muted); }
    .tx-input:focus {
      border-color: rgba(45,212,191,0.5);
      box-shadow: 0 0 0 3px rgba(45,212,191,0.1);
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 700; font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 14px 24px; border-radius: 8px;
      border: none; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .btn-teal {
      background: linear-gradient(135deg, #2dd4bf, #14b8a6);
      color: #06061a;
      box-shadow: 0 0 20px rgba(45,212,191,0.25);
    }
    .btn-teal:hover {
      box-shadow: 0 0 32px rgba(45,212,191,0.5);
      transform: translateY(-2px);
    }
    .btn-teal:active { transform: translateY(0); }
    .btn-demo {
      background: var(--gold-dim);
      border: 1px solid rgba(244,194,79,0.3) !important;
      color: var(--gold);
    }
    .btn-demo:hover {
      background: rgba(244,194,79,0.15);
      box-shadow: 0 0 20px rgba(244,194,79,0.2);
      transform: translateY(-2px);
    }

    .btn-row {
      display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;
    }

    /* ─── STATUS MSG ─── */
    #statusMsg {
      margin-top: 16px;
      font-size: 13px;
      font-family: var(--mono);
      color: var(--muted);
      min-height: 20px;
      transition: all 0.2s;
    }
    #statusMsg.error { color: var(--red); }
    #statusMsg.success { color: var(--teal); }

    /* ─── CARD SECTION ─── */
    #cardSection {
      display: none;
    }
    #cardSection.visible {
      display: block;
    }

    .card-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap; gap: 12px;
    }
    .card-section-header h2 {
      font-size: 16px; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted);
    }

    .canvas-wrapper {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #0b0f1a;
      margin-bottom: 20px;
    }

    #pnlCanvas {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ─── ACTION BUTTONS ─── */
    .action-buttons {
      display: flex; gap: 12px; flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .btn-dl {
      background: linear-gradient(135deg, #2dd4bf, #14b8a6);
      color: #06061a;
      box-shadow: 0 0 16px rgba(45,212,191,0.2);
    }
    .btn-dl:hover {
      box-shadow: 0 0 28px rgba(45,212,191,0.45);
      transform: translateY(-2px);
    }

    .btn-copy {
      background: var(--purple-dim);
      border: 1px solid var(--border-glow) !important;
      color: var(--purple-lt);
    }
    .btn-copy:hover {
      background: rgba(139,92,246,0.22);
      box-shadow: 0 0 20px rgba(139,92,246,0.3);
      transform: translateY(-2px);
    }

    /* ─── TWEET SHARE ─── */
    .tweet-share {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .tweet-label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 12px;
    }
    .tweet-text {
      font-size: 14px; color: var(--text); line-height: 1.6;
      margin-bottom: 16px; font-style: italic;
    }
    .btn-tweet {
      background: #1DA1F2;
      color: #fff;
      border: none;
    }
    .btn-tweet:hover {
      background: #1a8fd1;
      box-shadow: 0 0 20px rgba(29,161,242,0.4);
      transform: translateY(-2px);
    }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 640px) {
      nav { padding: 14px 20px; }
      .nav-wordmark { font-size: 12px; }
      main { padding: 100px 16px 60px; }
      .input-section { padding: 20px; }
      .input-row { flex-direction: column; }
      .btn { padding: 13px 18px; font-size: 12px; }
      .card-section-header { flex-direction: column; align-items: flex-start; }
      .action-buttons { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav>
  <a href="/" class="nav-brand">
    <img src="./logo.jpg" class="nav-logo" alt="COS TRINITY" />
    <span class="nav-wordmark">COS <em>TRINITY</em></span>
  </a>
  <div class="nav-links">
    <a href="/#snipr">SNiPr</a>
    <a href="/#plans">Plans</a>
    <a href="/" class="nav-back">← Home</a>
  </div>
</nav>

<!-- ─── MAIN ─── -->
<main>

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-eyebrow">
      <span class="eyebrow-dot"></span>
      SNiPr Results
    </div>
    <h1>PnL Card <span>Generator</span></h1>
    <p>Paste a Solana TX hash from your SNiPr trade and get a shareable result card in seconds.</p>
  </div>

  <!-- Input Section -->
  <div class="input-section">
    <label class="input-label" for="txInput">Transaction Hash</label>
    <div class="input-row">
      <input
        type="text"
        id="txInput"
        class="tx-input"
        placeholder="Paste your Solana TX hash here…"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn btn-teal" onclick="generateCard()">
        ⚡ Generate Card
      </button>
    </div>
    <div class="btn-row">
      <button class="btn btn-demo" onclick="runDemo()">
        🎯 Try Demo
      </button>
    </div>
    <div id="statusMsg"></div>
  </div>

  <!-- Card Section (hidden until generated) -->
  <div id="cardSection">
    <div class="card-section-header">
      <h2>📊 Your PnL Card</h2>
    </div>

    <div class="canvas-wrapper">
      <canvas id="pnlCanvas" width="800" height="450"></canvas>
    </div>

    <div class="action-buttons">
      <button class="btn btn-dl" onclick="downloadCard()">
        ⬇ Download PNG
      </button>
      <button class="btn btn-copy" onclick="copyCard()">
        📋 Copy Image
      </button>
    </div>

    <div class="tweet-share">
      <div class="tweet-label">🐦 Share on X / Twitter</div>
      <div class="tweet-text" id="tweetPreview">
        "Just made +284% with @COSTRINITY SNiPr 🔱 Autonomous AI trading on Solana. costrinity.xyz"
      </div>
      <button class="btn btn-tweet" onclick="tweetResult()">
        Post on X →
      </button>
    </div>
  </div>

</main>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const RPC_URL = 'https://api.mainnet-beta.solana.com';
const JUPITER_TOKEN_LIST = 'https://token.jup.ag/strict';

// ─── STATE ────────────────────────────────────────────────────────────────────
let currentCardData = null;
let tokenListCache = null;

// ─── DEMO MODE ────────────────────────────────────────────────────────────────
function runDemo() {
  const now = new Date();
  renderCard({
    token: 'BONK',
    tokenName: 'Bonk',
    pnlPct: 284,
    entrySOL: 0.050,
    exitSOL: 0.192,
    date: formatDate(now),
    label: 'Demo — SNiPr v5',
    isDemo: true,
  });
}

// ─── MAIN GENERATE ────────────────────────────────────────────────────────────
async function generateCard() {
  const hash = document.getElementById('txInput').value.trim();
  if (!hash) {
    setStatus('Please paste a transaction hash first.', 'error');
    return;
  }
  if (hash.length < 40) {
    setStatus('That doesn\'t look like a valid TX hash.', 'error');
    return;
  }

  setStatus('⏳ Fetching transaction…');

  try {
    const tx = await fetchTransaction(hash);
    if (!tx) {
      setStatus('Transaction not found. Showing demo card.', 'error');
      setTimeout(runDemo, 800);
      return;
    }

    setStatus('🔍 Parsing token transfers…');
    const parsed = await parseTransaction(tx);

    setStatus('✅ Card ready!', 'success');
    renderCard(parsed);
  } catch (err) {
    console.error(err);
    setStatus('⚠ Could not parse TX — showing demo card.', 'error');
    setTimeout(runDemo, 800);
  }
}

// ─── SOLANA FETCH ─────────────────────────────────────────────────────────────
async function fetchTransaction(signature) {
  const body = {
    jsonrpc: '2.0',
    id: 1,
    method: 'getTransaction',
    params: [
      signature,
      {
        encoding: 'jsonParsed',
        maxSupportedTransactionVersion: 0,
        commitment: 'confirmed',
      },
    ],
  };

  const res = await fetch(RPC_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });

  const data = await res.json();
  if (data.error || !data.result) return null;
  return data.result;
}

// ─── PARSE TX ─────────────────────────────────────────────────────────────────
async function parseTransaction(tx) {
  const meta = tx.meta;
  const blockTime = tx.blockTime;
  const now = blockTime ? new Date(blockTime * 1000) : new Date();

  // SOL balance changes
  const preBalances = meta.preBalances || [];
  const postBalances = meta.postBalances || [];
  const accountKeys = tx.transaction?.message?.accountKeys || [];

  // Find the fee payer (index 0) SOL delta
  const solIn  = preBalances[0]  / 1e9;
  const solOut = postBalances[0] / 1e9;
  const fee    = (meta.fee || 0) / 1e9;

  // Net SOL spent (negative = spent, positive = received)
  const netSOL = (solOut - solIn) + fee; // negative means spent

  let entrySOL = 0;
  let exitSOL  = 0;
  let pnlPct   = 0;

  // Token balance changes
  const preToken  = meta.preTokenBalances  || [];
  const postToken = meta.postTokenBalances || [];

  let mintAddress = null;
  let tokenDelta  = 0;

  // Find which token changed for fee payer
  const feePayerIdx = 0;
  for (const post of postToken) {
    const pre = preToken.find(
      p => p.accountIndex === post.accountIndex && p.mint === post.mint
    );
    const preAmt  = pre  ? parseFloat(pre.uiTokenAmount.uiAmountString  || '0') : 0;
    const postAmt = parseFloat(post.uiTokenAmount.uiAmountString || '0');
    const delta = postAmt - preAmt;

    if (Math.abs(delta) > 0) {
      mintAddress = post.mint;
      tokenDelta  = delta;
      break;
    }
  }

  // Interpret trade direction
  if (netSOL < 0) {
    // Spent SOL to buy tokens
    entrySOL = Math.abs(netSOL) - fee;
    exitSOL  = 0; // unknown exit yet — show entry only context
    pnlPct   = 0; // can't compute PnL for a buy-only TX
  } else {
    // Received SOL (sell)
    exitSOL  = netSOL + fee;
    entrySOL = exitSOL / 1.5; // approximate for display if no buy ref
    pnlPct   = entrySOL > 0 ? ((exitSOL - entrySOL) / entrySOL) * 100 : 0;
  }

  // Better heuristic: use token balance direction
  if (tokenDelta > 0) {
    // Received tokens = buy
    entrySOL = Math.abs(netSOL);
    exitSOL  = entrySOL; // no exit yet
    pnlPct   = 0;
  } else if (tokenDelta < 0) {
    // Sold tokens = sell
    exitSOL  = Math.abs(netSOL);
    entrySOL = exitSOL / 2; // rough estimate without buy TX
    pnlPct   = ((exitSOL - entrySOL) / entrySOL) * 100;
  }

  // Look up token metadata
  let tokenSymbol = 'TOKEN';
  let tokenName   = 'Unknown Token';

  if (mintAddress) {
    try {
      const meta = await getTokenMeta(mintAddress);
      if (meta) {
        tokenSymbol = meta.symbol || tokenSymbol;
        tokenName   = meta.name   || tokenName;
      }
    } catch (e) {
      // ignore
    }
  }

  return {
    token:     tokenSymbol,
    tokenName: tokenName,
    pnlPct:    Math.round(pnlPct * 10) / 10,
    entrySOL:  Math.round(entrySOL * 1000) / 1000,
    exitSOL:   Math.round(exitSOL * 1000) / 1000,
    date:      formatDate(now),
    label:     'SNiPr v5',
    isDemo:    false,
    mintAddress,
    txHash:    null,
  };
}

// ─── JUPITER TOKEN LIST ───────────────────────────────────────────────────────
async function getTokenMeta(mint) {
  if (!tokenListCache) {
    const res = await fetch(JUPITER_TOKEN_LIST);
    tokenListCache = await res.json();
  }
  return tokenListCache.find(t => t.address === mint) || null;
}

// ─── DATE FORMAT ─────────────────────────────────────────────────────────────
function formatDate(d) {
  return d.toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

// ─── RENDER CARD ─────────────────────────────────────────────────────────────
function renderCard(data) {
  currentCardData = data;

  const canvas = document.getElementById('pnlCanvas');
  const ctx    = canvas.getContext('2d');

  const W = 800;
  const H = 450;
  canvas.width  = W;
  canvas.height = H;

  // ── Background
  ctx.fillStyle = '#0b0f1a';
  ctx.fillRect(0, 0, W, H);

  // ── Subtle grid pattern
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // ── Ambient glow
  const glow = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 350);
  glow.addColorStop(0,   'rgba(45,212,191,0.07)');
  glow.addColorStop(0.6, 'rgba(109,40,217,0.04)');
  glow.addColorStop(1,   'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ── Border gradient (teal → purple → gold)
  const borderW = 2;
  function drawBorderGrad() {
    const r = 16;
    // Top edge (teal → purple)
    let g = ctx.createLinearGradient(0, 0, W, 0);
    g.addColorStop(0,   '#2dd4bf');
    g.addColorStop(0.5, '#7c3aed');
    g.addColorStop(1,   '#f4c24f');
    ctx.strokeStyle = g;
    ctx.lineWidth = borderW;
    ctx.beginPath();
    ctx.roundRect(borderW/2, borderW/2, W - borderW, H - borderW, r);
    ctx.stroke();
  }
  drawBorderGrad();

  // ── Top left: logo text
  ctx.font = 'bold 15px "JetBrains Mono", monospace';
  ctx.fillStyle = '#2dd4bf';
  ctx.textAlign = 'left';
  ctx.fillText('🔱 SNiPr by COS TRINITY', 28, 42);

  // ── Top right: date
  ctx.font = '12px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(232,234,240,0.45)';
  ctx.textAlign = 'right';
  ctx.fillText(data.date, W - 28, 42);

  // ── WIN / LOSS badge
  const isWin = data.pnlPct >= 0;
  const badgeText = isWin ? '✅  WIN' : '❌  LOSS';
  const badgeBg   = isWin ? 'rgba(74,222,128,0.15)' : 'rgba(248,113,113,0.15)';
  const badgeBord = isWin ? 'rgba(74,222,128,0.5)'  : 'rgba(248,113,113,0.5)';
  const badgeTxt  = isWin ? '#4ade80' : '#f87171';

  ctx.font = 'bold 13px "JetBrains Mono", monospace';
  const bw = ctx.measureText(badgeText).width + 28;
  const bh = 32;
  const bx = W - 28 - bw;
  const by = 60;

  ctx.fillStyle = badgeBg;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 999);
  ctx.fill();
  ctx.strokeStyle = badgeBord;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 999);
  ctx.stroke();

  ctx.fillStyle = badgeTxt;
  ctx.textAlign = 'center';
  ctx.fillText(badgeText, bx + bw/2, by + bh/2 + 5);

  // ── Center: token symbol
  ctx.textAlign = 'center';
  ctx.font = 'bold 72px "Inter", sans-serif';
  ctx.fillStyle = '#e8eaf0';
  ctx.letterSpacing = '0.02em';
  ctx.fillText(data.token, W/2, H/2 - 40);

  // token name (small)
  ctx.font = '16px "Inter", sans-serif';
  ctx.fillStyle = 'rgba(232,234,240,0.45)';
  ctx.fillText(data.tokenName, W/2, H/2 - 10);

  // ── Huge PnL %
  const pnlStr = (data.pnlPct >= 0 ? '+' : '') + data.pnlPct + '%';
  ctx.font = 'bold 88px "Inter", sans-serif';
  ctx.fillStyle = isWin ? '#4ade80' : '#f87171';

  // glow effect
  ctx.shadowColor  = isWin ? 'rgba(74,222,128,0.45)' : 'rgba(248,113,113,0.45)';
  ctx.shadowBlur   = 32;
  ctx.fillText(pnlStr, W/2, H/2 + 80);
  ctx.shadowBlur = 0;
  ctx.shadowColor = 'transparent';

  // ── Entry → Exit prices
  const solStr = `${data.entrySOL.toFixed(3)} SOL  →  ${data.exitSOL.toFixed(3)} SOL`;
  ctx.font = '500 18px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(232,234,240,0.55)';
  ctx.fillText(solStr, W/2, H/2 + 118);

  // ── Bottom bar
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(0, H - 52, W, 52);

  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 52); ctx.lineTo(W, H - 52); ctx.stroke();

  // watermark
  ctx.textAlign = 'center';
  ctx.font = '13px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(232,234,240,0.25)';
  ctx.fillText('costrinity.xyz', W/2, H - 20);

  // label (left)
  ctx.textAlign = 'left';
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(232,234,240,0.2)';
  ctx.fillText(data.label, 28, H - 18);

  // ── Show card section
  const section = document.getElementById('cardSection');
  section.classList.add('visible');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });

  // Update tweet text
  const sign = data.pnlPct >= 0 ? '+' : '';
  const tweetText = `Just made ${sign}${data.pnlPct}% with @COSTRINITY SNiPr 🔱 Autonomous AI trading on Solana. costrinity.xyz`;
  document.getElementById('tweetPreview').textContent = `"${tweetText}"`;
  document.getElementById('cardSection').setAttribute('data-tweet', tweetText);

  setStatus('✅ Card ready! Download or copy below.', 'success');
}

// ─── DOWNLOAD ─────────────────────────────────────────────────────────────────
function downloadCard() {
  const canvas = document.getElementById('pnlCanvas');
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href    = url;
    a.download = `snipr-pnl-${Date.now()}.png`;
    a.click();
    URL.revokeObjectURL(url);
  }, 'image/png');
}

// ─── COPY ─────────────────────────────────────────────────────────────────────
async function copyCard() {
  const canvas = document.getElementById('pnlCanvas');
  try {
    canvas.toBlob(async blob => {
      const item = new ClipboardItem({ 'image/png': blob });
      await navigator.clipboard.write([item]);
      setStatus('📋 Image copied to clipboard!', 'success');
    }, 'image/png');
  } catch (e) {
    setStatus('Copy not supported in this browser. Use Download instead.', 'error');
  }
}

// ─── TWEET ────────────────────────────────────────────────────────────────────
function tweetResult() {
  const section = document.getElementById('cardSection');
  const text = section.getAttribute('data-tweet')
    || 'Just made a trade with @COSTRINITY SNiPr 🔱 Autonomous AI trading on Solana. costrinity.xyz';
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank', 'noopener');
}

// ─── STATUS ───────────────────────────────────────────────────────────────────
function setStatus(msg, type = '') {
  const el = document.getElementById('statusMsg');
  el.textContent = msg;
  el.className   = type;
}

// ─── ENTER KEY ────────────────────────────────────────────────────────────────
document.getElementById('txInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateCard();
});
</script>
