<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNiPr License Portal — COS TRINITY</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔱</text></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a1628;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .container {
      max-width: 500px;
      width: 100%;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo h1 {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, #2dd4bf, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo p {
      color: #64748b;
      margin-top: 0.5rem;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 2rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1rem;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    input:focus {
      outline: none;
      border-color: #2dd4bf;
    }
    input::placeholder {
      color: #475569;
      text-transform: none;
      letter-spacing: normal;
    }
    button {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #2dd4bf, #14b8a6);
      border: none;
      border-radius: 8px;
      color: #0a1628;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(45,212,191,0.3);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .result {
      margin-top: 1.5rem;
      padding: 1rem;
      border-radius: 8px;
      display: none;
    }
    .result.success {
      display: block;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.3);
    }
    .result.error {
      display: block;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .result h3 {
      font-size: 1rem;
      margin-bottom: 0.5rem;
    }
    .result.success h3 { color: #22c55e; }
    .result.error h3 { color: #ef4444; }
    .result p {
      color: #94a3b8;
      font-size: 0.875rem;
      line-height: 1.6;
    }
    .tier-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      background: linear-gradient(135deg, #2dd4bf, #14b8a6);
      color: #0a1628;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      border-radius: 9999px;
      margin-left: 0.5rem;
    }
    .download-btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: #0a1628;
      border: 1px solid #2dd4bf;
      color: #2dd4bf;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
    }
    .download-btn:hover {
      background: #2dd4bf;
      color: #0a1628;
    }
    .features {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .features li {
      color: #94a3b8;
      font-size: 0.875rem;
      padding: 0.25rem 0;
      list-style: none;
    }
    .features li::before {
      content: "✓ ";
      color: #2dd4bf;
    }
    .back-link {
      text-align: center;
      margin-top: 2rem;
    }
    .back-link a {
      color: #64748b;
      text-decoration: none;
      font-size: 0.875rem;
    }
    .back-link a:hover {
      color: #2dd4bf;
    }
    .no-license {
      text-align: center;
      padding: 2rem 0;
    }
    .no-license p {
      color: #64748b;
      margin-bottom: 1rem;
    }
    .no-license a {
      color: #2dd4bf;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🔱 SNiPr License Portal</h1>
      <p>Verify your license and download the bot</p>
    </div>

    <div class="card">
      <form id="license-form">
        <div class="form-group">
          <label for="license-key">License Key</label>
          <input type="text" id="license-key" placeholder="SNIPR-XXXX-XXXX-XXXX" maxlength="19">
        </div>
        <button type="submit" id="verify-btn">Verify License</button>
      </form>

      <div id="result" class="result"></div>

      <div class="no-license">
        <p>Don't have a license yet?</p>
        <a href="/buy.html">Purchase SNiPr →</a>
      </div>
    </div>

    <div class="back-link">
      <a href="/">← Back to COS TRINITY</a>
    </div>
  </div>

  <script>
    const form = document.getElementById('license-form');
    const input = document.getElementById('license-key');
    const btn = document.getElementById('verify-btn');
    const result = document.getElementById('result');

    // Auto-format license key
    input.addEventListener('input', (e) => {
      let v = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
      if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
      if (v.length > 10) v = v.slice(0,10) + '-' + v.slice(10);
      if (v.length > 15) v = v.slice(0,15) + '-' + v.slice(15);
      e.target.value = v.slice(0,19);
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const key = input.value.trim();
      
      if (!/^SNIPR-[A-Z0-9]{4}-[A-Z0-9]{4}-[A-Z0-9]{4}$/.test(key)) {
        result.className = 'result error';
        result.innerHTML = '<h3>Invalid Format</h3><p>License key must be in format: SNIPR-XXXX-XXXX-XXXX</p>';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verifying...';

      try {
        const res = await fetch(`https://api.costrinity.xyz/api/license?key=${key}`);
        const data = await res.json();

        if (data.valid) {
          result.className = 'result success';
          result.innerHTML = `
            <h3>License Valid <span class="tier-badge">${data.tier}</span></h3>
            <p>Created: ${new Date(data.created_at).toLocaleDateString()}</p>
            ${data.expires_at ? `<p>Expires: ${new Date(data.expires_at).toLocaleDateString()}</p>` : '<p>Lifetime license</p>'}
            <ul class="features">
              ${data.features.map(f => `<li>${f}</li>`).join('')}
            </ul>
            <a href="/download?key=${key}" class="download-btn">⬇ Download SNiPr v5</a>
          `;
        } else {
          result.className = 'result error';
          result.innerHTML = `<h3>License Not Found</h3><p>${data.error || 'This license key does not exist or has expired.'}</p>`;
        }
      } catch (err) {
        result.className = 'result error';
        result.innerHTML = '<h3>Error</h3><p>Failed to verify license. Please try again.</p>';
      }

      btn.disabled = false;
      btn.textContent = 'Verify License';
    });

    // Check URL for pre-filled key
    const urlKey = new URLSearchParams(window.location.search).get('key');
    if (urlKey) {
      input.value = urlKey;
      form.dispatchEvent(new Event('submit'));
    }
  </script>
</body>
</html>
